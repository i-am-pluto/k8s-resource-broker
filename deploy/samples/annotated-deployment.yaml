apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: default
  labels:
    app: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
        resource-broker/profile: "k8s-efficient"  # label triggers objectSelector on MutatingWebhookConfiguration
      annotations:
        resource-broker/profile: "k8s-efficient"  # annotation read by handler.py as fallback
    spec:
      containers:
        - name: my-app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources: {}  # broker fills this in at admission time
