apiVersion: v1
kind: ConfigMap
metadata:
  name: broker-config
  namespace: resource-broker
  labels:
    app.kubernetes.io/name: resource-broker
data:
  BROKER_DATABASE_URL: "postgresql+asyncpg://broker:broker@postgres:5432/broker"
  BROKER_PROMETHEUS_URL: "http://prometheus:9090"
  BROKER_K8S_IN_CLUSTER: "true"
  BROKER_LOG_LEVEL: "INFO"
  BROKER_ENVIRONMENT: "production"
  BROKER_API_PORT: "8080"
  BROKER_SCRAPER_INTERVAL_SECONDS: "60"
  BROKER_PROFILE_ANNOTATION_KEY: "resource-broker/profile"
