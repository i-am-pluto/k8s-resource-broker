apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: resource-broker
  labels:
    app.kubernetes.io/name: resource-broker
webhooks:
  - name: broker.resource-broker.svc.cluster.local
    clientConfig:
      service:
        name: resource-broker
        namespace: resource-broker
        path: /api/v1/webhook/mutate
        port: 443
      caBundle: "" # Populated by the operator or cert-manager
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: "Namespaced"
    failurePolicy: Fail
    matchPolicy: Equivalent
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 10
    reinvocationPolicy: IfNeeded
    objectSelector:
      matchExpressions:
        - key: resource-broker/profile
          operator: Exists
