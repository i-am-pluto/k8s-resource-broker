services:

  postgres:
    image: postgres:16-alpine
    container_name: broker-postgres
    environment:
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: broker
      POSTGRES_DB: broker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broker"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: broker-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - promdata:/prometheus
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      postgres:
        condition: service_healthy

  broker-api:
    build:
      context: .
      dockerfile: Dockerfile.broker-api
    container_name: broker-api
    # single typer command (serve) auto-flattens — no subcommand word
    command: ["--port", "8080"]
    environment:
      BROKER_DATABASE_URL: postgresql+asyncpg://broker:broker@postgres:5432/broker
      BROKER_METRICS_URL: http://prometheus:9090
      BROKER_K8S_IN_CLUSTER: "false"
      BROKER_LOG_LEVEL: DEBUG
      BROKER_ENVIRONMENT: development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started

  # Cron-style scrape loop (issue #24). No HTTP surface, no port mapping.
  performance-monitor:
    build:
      context: .
      dockerfile: Dockerfile.performance-monitor
    container_name: performance-monitor
    command: []
    environment:
      BROKER_DATABASE_URL: postgresql+asyncpg://broker:broker@postgres:5432/broker
      BROKER_METRICS_URL: http://prometheus:9090
      BROKER_K8S_IN_CLUSTER: "false"
      BROKER_LOG_LEVEL: DEBUG
      BROKER_ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started

  # Cron-style percentile engine + Deployment watch (issue #25). NotImplementedError
  # until #25 lands — included here for compose-file completeness, not functional yet.
  recommender:
    build:
      context: .
      dockerfile: Dockerfile.recommender
    container_name: recommender
    command: []
    environment:
      BROKER_DATABASE_URL: postgresql+asyncpg://broker:broker@postgres:5432/broker
      BROKER_K8S_IN_CLUSTER: "false"
      BROKER_LOG_LEVEL: DEBUG
      BROKER_ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  promdata:
